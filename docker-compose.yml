# Example compose file for running the published image locally.
# NOT used by the GitHub Actions build — only for end users who want
# to run the daemon on their machine. Run with:
#   docker compose up -d


# ============================================================
# Prompt de bootstrap para Claude Code (otro repo, mismo compose)
# ------------------------------------------------------------
# Configura acceso git SSH, entorno Python standalone y registra
# el repo en el daemon paseo dentro del contenedor Dokploy
# <CONTAINER_NAME> (image paseo-claude, usuario paseo, volumen
# paseo-ssh -> ~/.ssh, volumen workspace -> /workspace).
# Todo lo intrusivo (write a GitHub, edicion de los JSON del
# daemon) ya esta pre-aprobado; no se pide confirmacion en pasos
# individuales.
#
# A) SSH:
#  1. Si no existe ~/.ssh/id_ed25519 dentro del contenedor:
#       ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
#       ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
#     (idempotente: saltar si ya existen).
#  2. Desde el HOST (no contenedor), leer la pubkey via
#     `docker exec ... cat id_ed25519.pub` y registrarla como
#     deploy key con escritura:
#       gh api repos/<OWNER>/<REPO>/keys \
#         -f title="<CONTAINER_NAME>" -f key="<PUB>" \
#         -F read_only=false
#  3. Probar `ssh -T git@github.com` (exit 1 es normal),
#     configurar git user.name/user.email global, y clonar:
#       git clone git@github.com:<OWNER>/<REPO>.git \
#         /workspace/<REPO>
#
# B) Python standalone dentro del repo (NO toca sistema):
#  4. Detectar version Python desde
#     <REPO>/<BACKEND_DIR>/Dockerfile.
#  5. Resolver tarball mas reciente de
#     astral-sh/python-build-standalone (asset
#     x86_64-unknown-linux-gnu-install_only_stripped.tar.gz)
#     via `gh api .../releases/latest`.
#  6. Dentro de /workspace/<REPO>: descargar con curl,
#     extraer con tar -xz, mover a `.python/`, crear venv en
#     `.venv/` con `.python/bin/python3 -m venv .venv` y hacer
#     `pip install -r <BACKEND_DIR>/requirements.txt`.
#  7. Smoke test de imports clave del repo.
#
# C) Gitignore (sin commit):
#  8. Anadir `.python/` y `.venv/` al .gitignore en dos sitios:
#     working copy local del usuario y clon del contenedor.
#     NO add, NO commit, NO push.
#
# D) Registrar en el daemon paseo:
#  9. Paseo CLI no tiene `project add`. Editar directamente:
#       /home/paseo/.paseo/projects/projects.json
#       /home/paseo/.paseo/projects/workspaces.json
#     Leer primero para deducir el schema, anadir un project
#     nuevo (uuid, name=<REPO>) y un workspace que lo
#     referencie con path=/workspace/<REPO>. Escribir atomico
#     via /tmp + mv. Verificar en la UI; si no aparece,
#     restart del compose en Dokploy.
#
# Necesito: <CONTAINER_NAME>, <OWNER>/<REPO>, <BACKEND_DIR>,
#           <GIT_NAME>, <GIT_EMAIL>.
# ============================================================



services:
  paseo:
    image: ghcr.io/edvantage26/paseo-claude:latest
    container_name: paseo
    restart: unless-stopped

    # No port exposed by default. The daemon connects outbound to the Paseo
    # relay, and clients (mobile app, CLI) meet it there. No inbound ports
    # required, no firewall changes needed.
    #
    # If you want direct LAN/VPN access instead, uncomment the block below
    # and set PASEO_PASSWORD in the environment section.
    # ports:
    #   - "6767:6767"

    volumes:
      # Persist Paseo state (daemon keys, sessions, config)
      - paseo-home:/home/paseo/.paseo
      # Persist Claude Code auth — NEVER bake this into the image
      - claude-home:/home/paseo/.claude
      # Container-local SSH key for git clone/push. Generate inside the
      # container (see README) and add the public key to your GitHub account.
      - paseo-ssh:/home/paseo/.ssh
      # Mount your code here so agents can edit it
      - ./workspace:/workspace
    environment:
      TZ: Europe/Madrid
      # Required only if you uncomment ports above for direct connections:
      # PASEO_PASSWORD: ${PASEO_PASSWORD}

volumes:
  paseo-home:
  claude-home:
  paseo-ssh:
