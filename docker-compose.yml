# Example compose file for running the published image locally.
# NOT used by the GitHub Actions build — only for end users who want
# to run the daemon on their machine. Run with:
#   docker compose up -d

# ============================================================
# Prompt de bootstrap para Claude Code (otro repo, mismo compose)
# ------------------------------------------------------------
# Configura acceso git SSH y entorno de desarrollo para
# <OWNER>/<REPO> dentro del contenedor Dokploy <CONTAINER_NAME>
# (image paseo-claude, usuario paseo, volumen paseo-ssh -> ~/.ssh).
#
# A) SSH:
#  1. Si no existe ~/.ssh/id_ed25519:
#       ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
#       ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
#  2. Desde el HOST (no contenedor) anade la publica como
#     deploy key con escritura:
#       gh api -X POST repos/<OWNER>/<REPO>/keys \
#         -f title="<CONTAINER_NAME>" -f key="<PUB>" \
#         -F read_only=false
#     Pide confirmacion antes (write access).
#  3. git clone -b <BRANCH> git@github.com:<OWNER>/<REPO>.git \
#       /workspace/<REPO>
#
# B) Toolchain standalone dentro del repo (NO toca sistema):
#  4. Detecta versiones desde el repo (Dockerfile, .nvmrc,
#     package.json). Instala uv y fnm en <REPO>/.tools/.
#     Crea venv en <BACKEND_DIR>/.venv con la version detectada
#     e instala requirements.txt + paquetes locales (libs/*).
#     En <FRONTEND_DIR> corre npm ci.
#  5. Genera .tools/activate.sh que exporte PATH con
#     .tools/uv/bin, .tools/fnm/bin, <BACKEND_DIR>/.venv/bin.
#
# C) Gitignore + verificacion:
#  6. Anade a .gitignore: .tools/, .venv/, **/node_modules/.
#     Commit local (NO push).
#  7. source .tools/activate.sh y comprueba python --version,
#     node --version, ejecutar tests/lint.
#
# Necesito: <CONTAINER_NAME>, <OWNER>/<REPO>, <BRANCH>,
#           <BACKEND_DIR>, <FRONTEND_DIR>.
# ============================================================


services:
  paseo:
    image: ghcr.io/edvantage26/paseo-claude:latest
    container_name: paseo
    restart: unless-stopped

    # No port exposed by default. The daemon connects outbound to the Paseo
    # relay, and clients (mobile app, CLI) meet it there. No inbound ports
    # required, no firewall changes needed.
    #
    # If you want direct LAN/VPN access instead, uncomment the block below
    # and set PASEO_PASSWORD in the environment section.
    # ports:
    #   - "6767:6767"

    volumes:
      # Persist Paseo state (daemon keys, sessions, config)
      - paseo-home:/home/paseo/.paseo
      # Persist Claude Code auth — NEVER bake this into the image
      - claude-home:/home/paseo/.claude
      # Container-local SSH key for git clone/push. Generate inside the
      # container (see README) and add the public key to your GitHub account.
      - paseo-ssh:/home/paseo/.ssh
      # Mount your code here so agents can edit it
      - ./workspace:/workspace
    environment:
      TZ: Europe/Madrid
      # Required only if you uncomment ports above for direct connections:
      # PASEO_PASSWORD: ${PASEO_PASSWORD}

volumes:
  paseo-home:
  claude-home:
  paseo-ssh:
